# Fly.io config for the Webull -> Supabase sync worker.
#
# Replace `app` with your own app name (must be globally unique) before first deploy.
app = "trading-journal-worker"
primary_region = "iad"

[build]

[env]
  PYTHONUNBUFFERED = "1"
  # Persist the Webull SDK's token cache and the fees cache across restarts/redeploys --
  # both live on the mounted volume below, not on the ephemeral container filesystem.
  WEBULL_OPENAPI_TOKEN_DIR = "/data/webull_token"
  WEBULL_FEES_CACHE_PATH = "/data/fees_cache.json"

[[mounts]]
  source = "worker_data"
  destination = "/data"

# Exposes POST /sync/trigger (manual refresh) and GET /healthz. Auth is the
# SYNC_TRIGGER_SECRET header check in sync_trigger_server.py, not anything at this
# layer -- `fly secrets set SYNC_TRIGGER_SECRET=...` before deploying, and set the
# same value as a Vercel env var so web/api/trigger-sync.ts can call in.
#
# min_machines_running = 1 keeps the machine up continuously (same as before this
# block existed) -- auto-stop would drop the SDK's warm cached token and the
# scheduler's in-memory state, which this app depends on staying alive.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
